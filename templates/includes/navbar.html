{% load static %}
<nav class="navbar navbar-expand-lg fixed-top transition-all py-4 {% if not is_home %}glass-nav shadow-sm{% endif %}">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <div class="bg-primary bg-opacity-10 p-2 rounded-3 me-2">
                <i class="fas fa-hand-holding-medical text-primary heartbeat"></i>
            </div>
            <span class="text-dark">HealthCare<span class="text-primary">Pro</span></span>
        </a>
        
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'doctor_list' %}">Specialists</a></li>
                <li class="nav-item"><a class="nav-link" href="#services">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="#testimonials">Testimonials</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
            
            <div class="d-flex align-items-center gap-3">
                <button id="theme-toggle" class="btn p-2 rounded-circle text-muted hover-bg-light transition-all border-0">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
                
                {% if user.is_authenticated %}
                    <div class="dropdown">
                        <a class="btn btn-light rounded-pill px-3 py-2 d-flex align-items-center gap-2 border-0 shadow-sm" href="#" role="button" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=2563EB&color=fff" class="rounded-circle" width="30" height="30">
                            <span class="fw-semibold small">{{ user.username }}</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-3 glass-card" style="border-radius: 1rem;">
                            <li><a class="dropdown-item py-2" href="{% url 'dashboard' %}"><i class="fas fa-th-large me-2 opacity-50"></i>Dashboard</a></li>
                            <li><a class="dropdown-item py-2" href="{% url 'profile_settings' %}"><i class="fas fa-user-edit me-2 opacity-50"></i>Profile</a></li>
                            <li><hr class="dropdown-divider opacity-10"></li>
                            <li>
                                <form action="{% url 'logout' %}" method="post" class="m-0">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item py-2 text-danger"><i class="fas fa-sign-out-alt me-2"></i>Sign Out</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="btn text-primary fw-bold">Sign In</a>
                    <a href="{% url 'doctor_list' %}" class="btn btn-premium btn-primary-grad">
                        Book Appointment <i class="bi bi-arrow-right-short fs-4"></i>
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<style>
@keyframes heartbeat {
    0% { transform: scale(1); }
    15% { transform: scale(1.1); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
    60% { transform: scale(1); }
}
.heartbeat {
    display: inline-block;
    animation: heartbeat 3s infinite;
}
</style>
