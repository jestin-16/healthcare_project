{% extends 'base.html' %}
{% block title %}Sign In | DocBook Concierge{% endblock %}

{% block content %}
<style>
    body { background-color: var(--off-white); }
    #content-wrapper { padding-top: 0 !important; }
    
    .split-layout {
        min-height: 100vh;
        display: flex;
    }

    .image-panel {
        width: 50%;
        background: linear-gradient(rgba(10,10,10,0.5), rgba(10,10,10,0.5)), url('https://images.unsplash.com/photo-1576091160550-2173dad99901?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: var(--white);
        padding: 60px;
        text-align: center;
        position: sticky;
        top: 0;
        height: 100vh;
    }

    .image-panel blockquote {
        font-family: var(--font-display);
        font-size: 2.5rem;
        font-weight: 500;
        max-width: 400px;
        margin-bottom: 30px;
    }

    .form-panel {
        width: 50%;
        background: var(--white);
        padding: 100px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .form-container {
        max-width: 400px;
        margin: 0 auto;
        width: 100%;
    }

    .form-control {
        border: none !important;
        border-bottom: 1px solid var(--border) !important;
        border-radius: 0 !important;
        background: transparent !important;
        padding: 12px 0 !important;
        box-shadow: none !important;
        font-family: var(--font-body);
        font-size: 1rem;
        color: var(--black);
    }
    .form-control:focus {
        border-bottom-color: var(--black) !important;
    }
    .form-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 4px;
        margin-top: 20px;
    }

    @media (max-width: 992px) {
        .image-panel { display: none; }
        .form-panel { width: 100%; padding: 120px 40px; }
    }
</style>

<div class="split-layout">
    <div class="image-panel">
        <blockquote class="fade-in">"Excellence in every interaction."</blockquote>
        <div class="gold-rule fade-in"></div>
    </div>
    
    <div class="form-panel">
        <div class="form-container fade-in">
            <span class="overline">WELCOME BACK</span>
            <h2 class="mb-5">Access Your Portal</h2>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Username or Email</label>
                    <input type="text" name="username" class="form-control" placeholder="your.name" required>
                </div>

                <div class="mb-5">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary-luxury w-100 py-3 mb-4">Sign In &rarr;</button>
                
                <div class="text-center">
                    <span class="text-muted small">New to DocBook?</span>
                    <a href="{% url 'register' %}" class="link-gold ms-1">Create account &rarr;</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
