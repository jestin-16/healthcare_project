{% extends 'base.html' %}
{% block title %}Modify User | HealthCare Pro{% endblock %}
{% block content %}
<div class="row justify-content-center py-5 fade-in">
    <div class="col-lg-8">
        <div class="card border-0 shadow-lg overflow-hidden">
            <div class="card-header bg-primary p-4 text-white">
                <div class="d-flex align-items-center">
                    <div class="bg-white bg-opacity-20 rounded p-3 me-3">
                        <i class="fas fa-user-edit fa-2x"></i>
                    </div>
                    <div>
                        <h2 class="h4 mb-0 fw-bold">Update Profile: {{ user_to_edit.username }}</h2>
                        <p class="mb-0 opacity-75 small text-uppercase ls-wide">User Reference ID: #{{ user_to_edit.id }}</p>
                    </div>
                </div>
            </div>
            
            <div class="card-body p-4 p-md-5 bg-white">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label x-small fw-bold text-uppercase ls-wide">First Name</label>
                            <input type="text" name="first_name" value="{{ user_to_edit.first_name }}" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label x-small fw-bold text-uppercase ls-wide">Last Name</label>
                            <input type="text" name="last_name" value="{{ user_to_edit.last_name }}" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label x-small fw-bold text-uppercase ls-wide">Email Address</label>
                            <input type="email" name="email" value="{{ user_to_edit.email }}" class="form-control">
                        </div>
                        
                        <div class="col-md-12">
                            <hr class="my-4 opacity-10">
                            <h5 class="fw-bold mb-3">Professional Credentials</h5>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label x-small fw-bold text-uppercase ls-wide">System Role</label>
                            <select name="role" id="role-select" class="form-select">
                                <option value="patient" {% if user_to_edit.profile.role == 'patient' %}selected{% endif %}>Patient</option>
                                <option value="doctor" {% if user_to_edit.profile.role == 'doctor' %}selected{% endif %}>Doctor</option>
                                <option value="nurse" {% if user_to_edit.profile.role == 'nurse' %}selected{% endif %}>Nurse</option>
                            </select>
                        </div>

                        <div class="col-md-6 role-extra" id="doctor-extra" style="display: none;">
                            <label class="form-label x-small fw-bold text-uppercase ls-wide">Specialization</label>
                            <select name="specialization" class="form-select">
                                <option value="General Physician" {% if user_to_edit.doctor_profile.specialization == "General Physician" %}selected{% endif %}>General Physician</option>
                                <option value="Cardiologist" {% if user_to_edit.doctor_profile.specialization == "Cardiologist" %}selected{% endif %}>Cardiologist</option>
                                <option value="Dermatologist" {% if user_to_edit.doctor_profile.specialization == "Dermatologist" %}selected{% endif %}>Dermatologist</option>
                                <option value="Neurologist" {% if user_to_edit.doctor_profile.specialization == "Neurologist" %}selected{% endif %}>Neurologist</option>
                                <option value="Pediatrician" {% if user_to_edit.doctor_profile.specialization == "Pediatrician" %}selected{% endif %}>Pediatrician</option>
                                <option value="Psychiatrist" {% if user_to_edit.doctor_profile.specialization == "Psychiatrist" %}selected{% endif %}>Psychiatrist</option>
                                <option value="Surgeon" {% if user_to_edit.doctor_profile.specialization == "Surgeon" %}selected{% endif %}>Surgeon</option>
                                <option value="Gynecologist" {% if user_to_edit.doctor_profile.specialization == "Gynecologist" %}selected{% endif %}>Gynecologist</option>
                                <option value="Orthopedic" {% if user_to_edit.doctor_profile.specialization == "Orthopedic" %}selected{% endif %}>Orthopedic</option>
                                <option value="Ophthalmologist" {% if user_to_edit.doctor_profile.specialization == "Ophthalmologist" %}selected{% endif %}>Ophthalmologist</option>
                            </select>
                        </div>


                        <div class="col-md-6 role-extra" id="nurse-extra" style="display: none;">
                            <label class="form-label x-small fw-bold text-uppercase ls-wide">Department</label>
                            <input type="text" name="department" value="{{ user_to_edit.nurse_profile.department }}" class="form-control" placeholder="e.g. Emergency">
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                        <a href="{% url 'user_management' %}" class="btn btn-light border px-4">Discard</a>
                        <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">
                            Commit Changes <i class="fas fa-save ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control, .form-select { border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 0.75rem; font-size: 0.9rem; }
    .form-control:focus, .form-select:focus { border-color: var(--primary-color); box-shadow: none; }
    .x-small { font-size: 0.75rem; }
</style>

<script>
    const roleSelect = document.getElementById('role-select');
    const docExtra = document.getElementById('doctor-extra');
    const nurseExtra = document.getElementById('nurse-extra');

    function toggleExtras() {
        docExtra.style.display = 'none';
        nurseExtra.style.display = 'none';
        if (roleSelect.value === 'doctor') docExtra.style.display = 'block';
        if (roleSelect.value === 'nurse') nurseExtra.style.display = 'block';
    }

    roleSelect.addEventListener('change', toggleExtras);
    toggleExtras();
</script>
{% endblock %}
