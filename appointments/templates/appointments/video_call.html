{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4 h-100">
    <div class="row h-100">
        <div class="col-12 h-100">
            <div class="card border-0 shadow-premium rounded-5 overflow-hidden h-100" style="min-height: 80vh;">
                <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-bold mb-0 text-dark">Telemedicine Consultation</h4>
                        <p class="text-muted small mb-0">Meeting with {{ appointment.doctor.user.get_full_name }} & {{ appointment.patient.get_full_name }}</p>
                    </div>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                        <i class="fas fa-phone-slash me-2"></i> End Call
                    </a>
                </div>
                <div class="card-body p-0 position-relative bg-dark" id="jitsi-container">
                    <!-- Jitsi will be injected here -->
                    <div id="meeting-placeholder" class="position-absolute top-50 start-50 translate-middle text-center text-white">
                        <div class="spinner-border text-primary mb-3" role="status"></div>
                        <p class="lead">Initializing secure connection...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Jitsi Meet External API -->
<script src='https://meet.jit.si/external_api.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const domain = 'meet.jit.si';
        const options = {
            roomName: '{{ room_name }}',
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            userInfo: {
                displayName: '{{ user_name }}'
            },
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false,
                disableDeepLinking: true,
            },
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'closedcaptions', 'desktop', 'embedmeeting', 'fullscreen',
                    'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                    'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                    'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                    'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
                    'security'
                ],
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);
        
        api.addEventListener('videoConferenceJoined', function() {
            document.getElementById('meeting-placeholder').style.display = 'none';
        });

        api.addEventListener('readyToClose', function() {
            window.location.href = "{% url 'dashboard' %}";
        });
    });
</script>

<style>
    #jitsi-container {
        height: 70vh;
        background: #1a1a1a;
    }
    .shadow-premium {
        box-shadow: 0 30px 60px -12px rgba(0,0,0,0.12);
    }
</style>
{% endblock %}
