{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4 h-100">
    <div class="row h-100">
        <div class="col-12 h-100">
            <div class="card border-0 shadow-premium rounded-5 overflow-hidden h-100" style="min-height: 80vh;">
                <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-bold mb-0 text-dark">Telemedicine Consultation</h4>
                        <p class="text-muted small mb-0">Meeting with {{ appointment.doctor.user.get_full_name }} & {{ appointment.patient.get_full_name }}</p>
                    </div>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                        <i class="fas fa-phone-slash me-2"></i> End Call
                    </a>
                </div>
                <div class="card-body p-0 position-relative bg-dark" id="jitsi-container">
                    <!-- Jitsi will be injected here -->
                    <div id="meeting-placeholder" class="position-absolute top-50 start-50 translate-middle text-center text-white">
                        <div class="spinner-border text-primary mb-3" role="status"></div>
                        <p class="lead">Initializing secure connection...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Jitsi Meet External API -->
<script src='https://meet.jit.si/external_api.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof JitsiMeetExternalAPI === 'undefined') {
            console.error("Jitsi Meet API script not loaded!");
            document.getElementById('meeting-placeholder').innerHTML = 
                '<div class="text-danger p-4"><i class="fas fa-exclamation-triangle fa-2x mb-3"></i>' +
                '<p>Video service script failed to load. Please check your internet connection or disable ad-blockers.</p></div>';
            return;
        }

        const roomName = '{{ room_name }}';
        if (!roomName) {
            console.error("Room name is missing!");
            document.getElementById('meeting-placeholder').innerHTML = '<p class="text-danger">Error: Meeting room not initialized.</p>';
            return;
        }

        const domain = 'meet.jit.si';
        const options = {
            roomName: roomName,
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            userInfo: {
                displayName: '{{ user_name }}'
            },
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false,
                disableDeepLinking: true,
                enableWelcomePage: false
            },
            interfaceConfigOverwrite: {
                TILE_VIEW_MAX_COLUMNS: 2,
            }
        };
        
        try {
            console.log("Initializing Jitsi with room:", roomName);
            const api = new JitsiMeetExternalAPI(domain, options);
            
            api.on('videoConferenceJoined', function() {
                console.log("Conference joined successfully");
                document.getElementById('meeting-placeholder').style.display = 'none';
            });

            api.on('error', function(err) {
                console.error("Jitsi Error:", err);
            });

            api.on('readyToClose', function() {
                window.location.href = "{% url 'dashboard' %}";
            });
        } catch (error) {
            console.error("Failed to initialize Jitsi API:", error);
            document.getElementById('meeting-placeholder').innerHTML = '<p class="text-danger">Failed to connect to video server. Please check your internet or try again later.</p>';
        }
    });
</script>

<style>
    #jitsi-container {
        height: 75vh;
        min-height: 500px;
        background: #000;
        width: 100%;
    }
    .shadow-premium {
        box-shadow: 0 30px 60px -12px rgba(0,0,0,0.12);
    }
    .w-fit { width: fit-content; }
</style>
{% endblock %}
